# SonarQube Configuration for Frontend

sonar.projectKey=marius-tasklist-frontend
sonar.projectName=Marius TaskList Frontend
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src
sonar.tests=src/__tests__

# Exclusions
sonar.exclusions=src/main.tsx,src/vite-env.d.ts,src/index.css,**/*.test.ts,**/*.test.tsx
sonar.test.inclusions=src/__tests__/**/*

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/__tests__/**,src/main.tsx,src/vite-env.d.ts

# Language
sonar.language=typescript

# Encoding
sonar.sourceEncoding=UTF-8

# Code properties
sonar.javascript.node.maxFileSize=900000
